<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SparkTest</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Sidebar -->
        <aside class="auth-sidebar">
            <a href="index.html" class="logo-link-wrapper">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                        <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#22C55E" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="logo-text"><span class="text-black">Spark</span><span class="text-primary">Test</span></span>
                </div>
            </a>

            <div class="auth-sidebar-content">
                <h1>Welcome Back</h1>
                <p>Resume your journey toward engineering excellence. Log in to access your dashboard, mock tests, and latest results.</p>
                
                <div class="auth-illustration-box">
                    <img src="assets/auth-illustration.png" alt="Engineering Illustration">
                </div>
            </div>

            <div class="auth-sidebar-footer">
                <p>© 2024 SparkTest. Engineering excellence through practice.</p>
            </div>
        </aside>

        <!-- Form Section -->
        <main class="auth-form-section">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Log In</h2>
                    <a href="signup.html" class="toggle-link">Create Account</a>
                </div>
                <!-- <p class="auth-subtitle">Continue where you left off.</p> -->

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="nikola@sparktest.com" required>
                    </div>
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label style="margin-bottom: 0;">Password</label>
                            <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-auth">Log In</button>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <button type="button" class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                        </svg>
                        Continue with Google
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/supabase-client.js"></script>
    <script>
        // Simple GSAP entrance
        gsap.from(".auth-card > *", {
            opacity: 0,
            y: 20,
            duration: 0.8,
            stagger: 0.1,
            ease: "power2.out"
        });
    </script>
</body>
</html>
